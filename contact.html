<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Max Lopez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-['Inter'] transition-colors duration-300">
    
    <custom-header></custom-header>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-4xl font-bold text-center mb-12">Get In Touch</h1>

         <!-- Additional Contact Info -->
        <section class="mb-16">
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-8 max-w-2xl mx-auto text-center">
                <h2 class="text-2xl font-bold mb-6">Other Ways to Connect</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-medium mb-2">Email</h3>
                        <p>mlopez.applications@gmail.com</p>
                    </div>
                    <div>
                        <h3 class="font-medium mb-2">Social Media</h3>
                        <div class="flex justify-center gap-4">
                            <a href="https://www.linkedin.com/in/mlope" target="_blank" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300" aria-label="LinkedIn">
                                <i data-feather="linkedin"></i>
                            </a>
                            <a href="https://www.behance.net/maximinio" target="_blank" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300" aria-label="Behance">
                                <i data-feather="external-link"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="contact mb-16">
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-8 max-w-2xl mx-auto">
                <h2 class="text-3xl font-bold text-center mb-6">Contact</h2>
                <p class="text-center mb-6">
                    Design is about creating connections. 
                    <br>Let's make something unforgettable.
                </p>
                <p class="text-sm text-center mb-8 text-gray-500 dark:text-gray-400">
                    Fill out the form below and I'll get back to you as soon as possible.
                </p>
                <!-- Replace the action URL below with your Formspree endpoint -->
                <form action="https://formspree.io/f/mzdovjqj" method="POST" class="space-y-4">
                    <div>
                        <label for="email" class="block mb-2 font-medium">Email</label>
                        <input type="email" name="email" id="email" required placeholder="Email" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="subject" class="block mb-2 font-medium">Subject</label>
                        <input type="text" name="subject" id="subject" required placeholder="Subject" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="message" class="block mb-2 font-medium">Message</label>
                        <textarea name="message" id="message" required placeholder="Message" rows="4" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <button type="submit" class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors duration-300">
                        Submit
                    </button>
                </form>
            </div>
        </section>

  
    </main>

    <custom-footer></custom-footer>

    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script>feather.replace();</script>
</body>
</html>
